name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly re-scan so newly disclosed CVEs are caught even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip bandit
      - name: Bandit
        run: bandit -c pyproject.toml -r src

  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime deps (clean env)
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: pip-audit
        run: |
          python -m pip install pip-audit
          pip-audit --desc

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Scan for secrets
        run: gitleaks detect --source . -v
