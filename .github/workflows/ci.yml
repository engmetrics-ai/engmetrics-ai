name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type · Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check --output-format=github .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests + coverage (pytest)
        run: pytest --cov=ai_engineering_metrics --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build-e2e:
    name: Build · Publish check · E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Check package metadata (simulates PyPI upload validation)
        run: twine check --strict dist/*

      - name: E2E (mock) — install from wheel and run CLI
        run: |
          pip install dist/*.whl
          ai-engineering-metrics --version

          # configure command must be present and show help without error
          ai-engineering-metrics configure --help

          # analyze without credentials in a non-TTY env must exit 1 with a clear message
          set +e
          output=$(ai-engineering-metrics analyze --epic PROJ-1 2>&1)
          code=$?
          set -e
          [ $code -eq 1 ] || { echo "Expected exit 1 for unconfigured analyze, got $code"; exit 1; }
          echo "$output" | grep -qi "configure\|JIRA_BASE_URL" \
            || { echo "Expected helpful error message, got: $output"; exit 1; }
          echo "E2E: unconfigured analyze exits 1 in non-TTY — OK"

          # mock mode must still work with no credentials
          ai-engineering-metrics analyze --mock --output /tmp/e2e-mock
          test -f /tmp/e2e-mock/DEMO-1/dashboard.html
          test -f /tmp/e2e-mock/DEMO-1/metrics.json
          test -f /tmp/e2e-mock/DEMO-1/stories.csv
          test -f /tmp/e2e-mock/DEMO-1/pull_requests.csv
          echo "E2E (mock) passed — all artifacts present"

      - name: Upload mock dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-dashboard
          path: /tmp/e2e-mock/DEMO-1/dashboard.html
          if-no-files-found: error

      - name: E2E (real JIRA) — run CLI with live credentials
        if: env.JIRA_API_TOKEN != ''
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_TEST_EPIC: ${{ secrets.JIRA_TEST_EPIC }}
        run: |
          ai-engineering-metrics analyze \
            --epic "$JIRA_TEST_EPIC" \
            --output /tmp/e2e-real
          epic_dir="/tmp/e2e-real/$JIRA_TEST_EPIC"
          test -f "$epic_dir/dashboard.html"
          test -f "$epic_dir/metrics.json"
          python - <<'PY'
          import json, sys, pathlib, os
          p = pathlib.Path(f"/tmp/e2e-real/{os.environ['JIRA_TEST_EPIC']}/metrics.json")
          data = json.loads(p.read_text())
          assert "epic" in data, "metrics.json missing 'epic' key"
          assert "productivity" in data, "metrics.json missing 'productivity' key"
          print(f"Real JIRA E2E passed: {data['epic']['key']} — "
                f"{data['productivity']['hours_saved']}h saved")
          PY

      - name: Upload real dashboard artifact
        if: env.JIRA_API_TOKEN != ''
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_TEST_EPIC: ${{ secrets.JIRA_TEST_EPIC }}
        uses: actions/upload-artifact@v4
        with:
          name: real-dashboard
          path: /tmp/e2e-real/${{ secrets.JIRA_TEST_EPIC }}/dashboard.html
          if-no-files-found: warn

  docker:
    name: Docker build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build

      - name: Run full suite in container
        run: docker compose -f docker-compose.test.yml run --rm test
